<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandanten-Onboarding Pro — Kanzlei</title>
<style>
:root{
  --teal:#1D9E75;--teal-d:#0F6E56;--teal-dd:#085041;
  --teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --blue-l:#E6F1FB;--blue-b:#85B7EB;--blue-d:#0C447C;
  --amber-l:#FAEEDA;--amber-b:#FAC775;--amber-d:#633806;
  --red-l:#FCEBEB;--red-b:#F09595;--red-d:#A32D2D;
  --gray:#888;--border:#ddd;--bg:#f5f5f2;--white:#fff;
  --radius:8px;--radius-lg:12px;
  --shadow:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.1);
}
[data-theme="dark"]{
  --bg:#1a1a1a;--white:#242424;--border:#333;
  --gray:#999;--teal-l:#0f3d2e;
  color:#e0e0e0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:#1a1a1a;font-size:15px;transition:background .3s,color .3s}
.page{max-width:860px;margin:0 auto;padding:24px 16px 60px}

.kanzlei-header{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
.kanzlei-logo{width:48px;height:48px;background:var(--teal);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kanzlei-logo svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kanzlei-header h1{font-size:18px;font-weight:600;color:var(--teal-dd)}
.kanzlei-header p{font-size:13px;color:var(--gray);margin-top:2px}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

.theme-btn{border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px;cursor:pointer;background:var(--white);color:var(--gray);font-family:inherit;transition:all .2s}
.theme-btn:hover{border-color:var(--teal);color:var(--teal-d)}

.steps-nav{display:flex;gap:0;margin-bottom:20px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;overflow-x:auto;box-shadow:var(--shadow)}
.step-btn{padding:12px 16px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--gray);border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .15s;position:relative}
.step-btn.active{color:var(--teal-d);border-bottom-color:var(--teal);background:var(--teal-l)}
.step-btn.done{color:var(--teal-d)}
.step-btn.done::before{content:'✓ ';font-size:11px}
.step-btn.error{border-bottom-color:var(--red-d)!important;color:var(--red-d)!important}
.step-btn .step-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--gray);font-size:10px;margin-right:4px;font-weight:700}
.step-btn.active .step-num,.step-btn.done .step-num{background:var(--teal);color:#fff}

.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:6px}
.progress-track{height:6px;background:#e8e8e5;border-radius:3px;overflow:hidden}
.progress-fill{height:6px;background:var(--teal);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-fill.error{background:var(--red-d)}

.section{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:11px;font-weight:700;color:var(--teal-d);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.section-title svg{width:14px;height:14px;stroke:var(--teal-d);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col2{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:#555;font-weight:600;display:flex;align-items:center;gap:4px}
.field input,.field select,.field textarea{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;font-size:14px;background:var(--white);color:#1a1a1a;
  width:100%;font-family:inherit;transition:all .2s
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}
.field input.error,.field select.error,.field textarea.error{border-color:var(--red-d);background:var(--red-l)}
.field input.error:focus{box-shadow:0 0 0 3px var(--red-l)}
.field textarea{resize:vertical;min-height:80px}
.field .hint{font-size:11px;color:var(--gray);margin-top:2px}
.req{color:var(--teal-d)}
.error-msg{color:var(--red-d);font-size:11px;margin-top:3px;display:none}
.error-msg.show{display:block}

.tgl{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.tb{border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-size:12px;cursor:pointer;background:var(--white);color:#333;font-family:inherit;font-weight:500;transition:all .15s}
.tb:hover{border-color:var(--teal);transform:translateY(-1px)}
.tb.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal-dd);font-weight:600;box-shadow:0 2px 4px rgba(29,158,117,0.15)}
.tb.error{border-color:var(--red-d);background:var(--red-l)}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.type-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius-lg);padding:24px;cursor:pointer;text-align:left;transition:all .2s;font-family:inherit;position:relative;overflow:hidden}
.type-card:hover{border-color:var(--teal-m);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.type-card.active{border-color:var(--teal);background:var(--teal-l)}
.type-card svg{width:32px;height:32px;stroke:var(--teal-d);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin-bottom:12px}
.type-card h3{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.type-card p{font-size:13px;color:var(--gray);line-height:1.4}
.type-card .check-icon{position:absolute;top:16px;right:16px;width:24px;height:24px;background:var(--teal);color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:14px}
.type-card.active .check-icon{display:flex}

.infobox{background:var(--blue-l);border:1px solid var(--blue-b);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--blue-d);display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.infobox svg{width:16px;height:16px;stroke:var(--blue-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}
.warnbox{background:var(--amber-l);border:1px solid var(--amber-b);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--amber-d);display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.warnbox svg{width:16px;height:16px;stroke:var(--amber-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}
.errorbox{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--red-d);display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.errorbox svg{width:16px;height:16px;stroke:var(--red-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}

.kind-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;background:var(--white);transition:all .2s}
.kind-card:hover{border-color:var(--teal-m);box-shadow:var(--shadow)}
.kind-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kind-title{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600}
.b-teal{background:var(--teal-l);color:var(--teal-dd)}
.b-blue{background:var(--blue-l);color:var(--blue-d)}
.b-amber{background:var(--amber-l);color:var(--amber-d)}
.b-red{background:var(--red-l);color:var(--red-d)}
.del-btn{border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:12px;cursor:pointer;background:var(--white);color:var(--gray);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px}
.del-btn:hover{border-color:var(--red-b);color:var(--red-d);background:var(--red-l)}
.add-btn{border:2px dashed var(--teal-m);border-radius:var(--radius);padding:12px 16px;font-size:14px;cursor:pointer;background:none;color:var(--teal-d);font-family:inherit;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:8px;width:100%;justify-content:center;transition:all .2s}
.add-btn:hover{background:var(--teal-l);border-color:var(--teal);transform:translateY(-1px)}

.nav-bar{display:flex;gap:12px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.btn-primary{flex:1;background:var(--teal);color:var(--white);border:none;border-radius:var(--radius);padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 2px 8px rgba(29,158,117,0.3)}
.btn-primary:hover{background:var(--teal-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,158,117,0.4)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;box-shadow:none;transform:none}
.btn-secondary{border:1px solid var(--border);border-radius:var(--radius);padding:11px 20px;font-size:13px;cursor:pointer;background:var(--white);color:#333;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal-d);transform:translateY(-1px)}
.btn-print{border:1px solid var(--teal);border-radius:var(--radius);padding:11px 20px;font-size:13px;cursor:pointer;background:var(--teal-l);color:var(--teal-d);font-family:inherit;font-weight:600;transition:all .2s}
.btn-print:hover{background:var(--teal);color:#fff}
.btn-export{border:1px solid var(--blue-b);border-radius:var(--radius);padding:11px 20px;font-size:13px;cursor:pointer;background:var(--blue-l);color:var(--blue-d);font-family:inherit;font-weight:600;transition:all .2s}
.btn-export:hover{background:var(--blue-b);color:#fff}

.sum-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;background:var(--white);box-shadow:var(--shadow)}
.sum-head{background:var(--teal-l);padding:12px 18px;font-size:12px;font-weight:700;color:var(--teal-dd);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid #f0f0ee;font-size:13px;transition:background .15s}
.sum-row:hover{background:rgba(29,158,117,0.03)}
.sum-row:last-child{border-bottom:none}
.sum-k{color:var(--gray);font-weight:500}
.sum-v{font-weight:600;color:#1a1a1a;text-align:right;max-width:55%;word-break:break-word}
.sum-v.empty{color:var(--gray);font-style:italic}

.done-banner{background:var(--teal-l);border:1px solid var(--teal-m);border-radius:var(--radius-lg);padding:28px;text-align:center;margin-bottom:20px;animation:slideDown .4s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.done-banner .check{font-size:42px;display:block;margin-bottom:10px}
.done-banner h2{font-size:18px;font-weight:700;color:var(--teal-dd)}
.done-banner p{font-size:14px;color:var(--teal-d);margin-top:6px}

.intern-banner{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--radius);padding:12px 14px;font-size:12px;color:#7c2d12;margin-bottom:16px;display:flex;gap:10px;align-items:center;font-weight:500}

.autosave-indicator{position:fixed;bottom:20px;right:20px;background:var(--teal);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;display:none;align-items:center;gap:8px;box-shadow:var(--shadow-lg);z-index:1000;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.autosave-indicator.show{display:flex}
.autosave-indicator.saved{background:var(--teal)}
.autosave-indicator.saving{background:var(--gray)}

.undo-bar{position:fixed;bottom:20px;left:20px;display:flex;gap:6px;z-index:1000}
.undo-btn{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;cursor:pointer;color:var(--gray);font-family:inherit;transition:all .2s;box-shadow:var(--shadow)}
.undo-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal-d)}
.undo-btn:disabled{opacity:.4;cursor:not-allowed}

.step-page{display:none}
.step-page.active{display:block}

.print-only{display:none}
@media print{
  .steps-nav,.nav-bar,.btn-primary,.btn-secondary,.btn-print,.btn-export,.no-print,.autosave-indicator,.undo-bar,.theme-btn{display:none!important}
  .step-page{display:block!important}
  body{background:#fff}
  .section{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
}

@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  .col2{grid-column:1}
  .type-grid{grid-template-columns:1fr}
  .steps-nav{flex-wrap:nowrap}
  .kanzlei-header{flex-wrap:wrap}
  .header-actions{width:100%;justify-content:flex-end;margin-top:10px}
  .sum-row{flex-direction:column;align-items:flex-start;gap:4px}
  .sum-v{max-width:100%;text-align:left}
}
</style>
</head>
<body>
<div class="page">

<div class="kanzlei-header">
  <div class="kanzlei-logo">
    <svg viewBox="0 0 24 24"><path d="M3 21h18M3 7v1a3 3 0 006 0V7m0 1a3 3 0 006 0V7m0 1a3 3 0 006 0V7H3l2-4h14l2 4"/></svg>
  </div>
  <div>
    <h1>Mandanten-Onboarding Pro</h1>
    <p>Neue Mandanten aufnehmen — Privat & Unternehmen</p>
  </div>
  <div class="header-actions no-print">
    <button class="theme-btn" onclick="toggleTheme()" title="Dark Mode">🌙</button>
    <button class="btn-print" onclick="window.print()">🖨 Drucken / PDF</button>
  </div>
</div>

<div class="steps-nav" id="stepsNav"></div>
<div class="progress-wrap">
  <div class="progress-label"><span id="stepLabel">Schritt 1</span><span id="stepPct">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="pages"></div>

</div>

<div class="autosave-indicator" id="autosaveInd">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20,6 9,17 4,12"/></svg>
  <span id="autosaveText">Gespeichert</span>
</div>

<div class="undo-bar no-print">
  <button class="undo-btn" id="undoBtn" onclick="undo()" disabled title="Rückgängig (Ctrl+Z)">↩ Rückgängig</button>
  <button class="undo-btn" id="redoBtn" onclick="redo()" disabled title="Wiederherstellen (Ctrl+Y)">↪ Wiederherstellen</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'mandanten_onboarding_v2';
const HISTORY_LIMIT = 50;

let D = {};
let currentStep = 0;
let history = [];
let historyIndex = -1;
let isUndoing = false;

const STEPS_PRIV = ['Mandantentyp','Persoenliche Daten','Familie & Kinder','Kommunikation','Adresse & Finanzamt','Bankverbindung','Leistungen','Intern','Zusammenfassung'];
const STEPS_FIRM = ['Mandantentyp','Unternehmen','Ansprechpartner','Familie & Kinder','Kommunikation','Adresse & Finanzamt','Bankverbindung','Leistungen','Intern','Zusammenfassung'];

function steps(){ return D.mtype==='firma' ? STEPS_FIRM : STEPS_PRIV; }

const SVG = {
  user:'<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  building:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h1M9 13h1M9 17h1M14 9h1M14 13h1M14 17h1"/></svg>',
  heart:'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>',
  phone:'<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/></svg>',
  map:'<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  bank:'<svg viewBox="0 0 24 24"><path d="M3 22V12M21 22V12M6 22V12M18 22V12M9 22V12M15 22V12M12 22V12M2 12l10-9 10 9H2z"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>',
  lock:'<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
  info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
  warn:'<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  baby:'<svg viewBox="0 0 24 24"><circle cx="12" cy="4" r="2"/><path d="M9 12H5l2 9h10l2-9h-4M9 12c0-3 1.5-5 3-5s3 2 3 5"/></svg>',
  export:'<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
};

const VALIDATORS = {
  email: function(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); },
  iban: function(v) {
    var iban = v.replace(/\s/g,'').toUpperCase();
    if(iban.length < 15 || iban.length > 34) return false;
    var rearranged = iban.slice(4) + iban.slice(0,4);
    var numeric = Array.from(rearranged).map(function(c) { return /[A-Z]/.test(c) ? (c.charCodeAt(0)-55).toString() : c; }).join('');
    var remainder = numeric;
    while(remainder.length > 2){
      remainder = (parseInt(remainder.slice(0,9),10) % 97).toString() + remainder.slice(9);
    }
    return parseInt(remainder,10) % 97 === 1;
  },
  steuerid: function(v) { return /^\d{11}$/.test(v.replace(/\s/g,'')); },
  plz: function(v) { return /^\d{5}$/.test(v.replace(/\s/g,'')); },
  phone: function(v) { return /^[\+0-9\s\-\(\)]{6,}$/.test(v); },
  required: function(v) { return v && v.toString().trim().length > 0; }
};

function pushHistory(){
  if(isUndoing) return;
  var snapshot = JSON.stringify(D);
  if(history[historyIndex] === snapshot) return;
  history = history.slice(0, historyIndex + 1);
  history.push(snapshot);
  if(history.length > HISTORY_LIMIT) history.shift();
  else historyIndex++;
  updateUndoButtons();
}

function undo(){
  if(historyIndex > 0){
    isUndoing = true;
    historyIndex--;
    D = JSON.parse(history[historyIndex]);
    renderAll();
    showAutosave('Rueckgaengig gemacht');
    updateUndoButtons();
    setTimeout(function(){isUndoing=false;}, 50);
  }
}

function redo(){
  if(historyIndex < history.length - 1){
    isUndoing = true;
    historyIndex++;
    D = JSON.parse(history[historyIndex]);
    renderAll();
    showAutosave('Wiederhergestellt');
    updateUndoButtons();
    setTimeout(function(){isUndoing=false;}, 50);
  }
}

function updateUndoButtons(){
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
}

function saveToStorage(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({data:D, step:currentStep, timestamp:Date.now()}));
    showAutosave('Gespeichert');
  }catch(e){ console.warn('Speichern fehlgeschlagen', e); }
}

function loadFromStorage(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var saved = JSON.parse(raw);
      if(saved.data) D = saved.data;
      if(saved.step !== undefined) currentStep = saved.step;
      return true;
    }
  }catch(e){ console.warn('Laden fehlgeschlagen', e); }
  return false;
}

function clearStorage(){
  localStorage.removeItem(STORAGE_KEY);
  D = {};
  currentStep = 0;
  history = [];
  historyIndex = -1;
  renderAll();
}

var autosaveTimeout;
function debouncedSave(){
  clearTimeout(autosaveTimeout);
  showAutosave('Speichern...', 'saving');
  autosaveTimeout = setTimeout(function(){
    saveToStorage();
    pushHistory();
  }, 800);
}

function showAutosave(text, type){
  var el = document.getElementById('autosaveInd');
  var txt = document.getElementById('autosaveText');
  el.className = 'autosave-indicator show ' + (type || 'saved');
  txt.textContent = text;
  if((type || 'saved') !== 'saving'){
    setTimeout(function(){el.classList.remove('show');}, 2000);
  }
}

function generateMandantenNr(){
  if(D.intmandnr) return D.intmandnr;
  var prefix = D.mtype==='firma' ? 'F' : 'P';
  var date = new Date();
  var rand = Math.floor(Math.random()*9000)+1000;
  return prefix + date.getFullYear() + String(date.getMonth()+1).padStart(2,'0') + '-' + rand;
}

}

function fld(label, key, type, placeholder, opts, req, validator, hint){
  type = type || 'text';
  placeholder = placeholder || '';
  req = req || false;
  var val = D[key] || '';
  var hasError = D._errors && D._errors[key];
  var errorMsg = hasError ? (typeof hasError === 'string' ? hasError : 'Ungueltige Eingabe') : '';
  
  var inputHtml;
  if(type==='select'){
    var optsHtml = '<option value="">- waehlen -</option>';
    for(var i=0; i<opts.length; i++){
      optsHtml += '<option value="' + opts[i] + '" ' + (val===opts[i]?'selected':'') + '>' + opts[i] + '</option>';
    }
    inputHtml = '<select id="fld_' + key + '" class="' + (hasError?'error':'') + '" onchange="updateField(\'' + key + '\',this.value);' + (validator?'validateField(\'' + key + '\',this.value,\'' + validator + '\')':'') + '">' + optsHtml + '</select>';
  } else if(type==='textarea'){
    inputHtml = '<textarea id="fld_' + key + '" class="' + (hasError?'error':'') + '" placeholder="' + placeholder + '" onchange="updateField(\'' + key + '\',this.value);' + (validator?'validateField(\'' + key + '\',this.value,\'' + validator + '\')':'') + '">' + val + '</textarea>';
  } else {
    inputHtml = '<input type="' + type + '" id="fld_' + key + '" class="' + (hasError?'error':'') + '" value="' + val + '" placeholder="' + placeholder + '" onchange="updateField(\'' + key + '\',this.value);' + (validator?'validateField(\'' + key + '\',this.value,\'' + validator + '\')':'') + '" onblur="' + (validator?'validateField(\'' + key + '\',this.value,\'' + validator + '\')':'') + '">';
  }
  
  var reqSpan = req ? '<span class="req">*</span>' : '';
  var hintDiv = hint ? '<div class="hint">' + hint + '</div>' : '';
  var errorDiv = '<div class="error-msg ' + (hasError?'show':'') + '" id="err_' + key + '">' + errorMsg + '</div>';
  
  return '<div class="field"><label>' + label + reqSpan + '</label>' + inputHtml + hintDiv + errorDiv + '</div>';
}

function updateField(key, value){
  D[key] = value;
  if(D._errors) delete D._errors[key];
  debouncedSave();
}

function validateField(key, value, validator){
  if(!validator) return true;
  var valid = true;
  if(validator==='email') valid = VALIDATORS.email(value);
  else if(validator==='iban') valid = VALIDATORS.iban(value);
  else if(validator==='steuerid') valid = VALIDATORS.steuerid(value);
  else if(validator==='plz') valid = VALIDATORS.plz(value);
  else if(validator==='phone') valid = VALIDATORS.phone(value);
  else if(validator==='required') valid = VALIDATORS.required(value);
  
  if(!valid){
    if(!D._errors) D._errors = {};
    D._errors[key] = 'Ungueltige Eingabe';
  } else if(D._errors){
    delete D._errors[key];
  }
  renderAll();
  return valid;
}

function tgl(label, key, options, multi, req){
  multi = multi || false;
  req = req || false;
  var val = D[key] || (multi ? [] : '');
  var hasError = D._errors && D._errors[key];
  
  var btns = '';
  for(var i=0; i<options.length; i++){
    var v = options[i];
    var on = multi ? (Array.isArray(val) && val.indexOf(v) > -1) : val===v;
    var click;
    if(multi){
      click = 'onclick="toggleArr(\'' + key + '\',\'' + v + '\');debouncedSave()"';
    } else {
      click = 'onclick="D[\'' + key + '\']=\'' + v + '\';if(D._errors)delete D._errors[\'' + key + '\'];debouncedSave();renderAll()"';
    }
    btns += '<button class="tb ' + (on?'on ':'') + (hasError?'error':'') + '" ' + click + '>' + v + '</button>';
  }
  
  var reqSpan = req ? '<span class="req">*</span>' : '';
  var errorDiv = hasError ? '<div class="error-msg show">Bitte mindestens eine Option waehlen</div>' : '';
  
  return '<div class="field col2"><label>' + label + reqSpan + '</label><div class="tgl">' + btns + '</div>' + errorDiv + '</div>';
}

function getPageContent(idx){
  var s = steps();
  var name = s[idx];
  if(idx===0) return pageType();
  if(name==='Persoenliche Daten') return pagePerson();
  if(name==='Unternehmen') return pageCompany();
  if(name==='Ansprechpartner') return pageContact();
  if(name==='Familie & Kinder') return pageFamilie();
  if(name==='Kommunikation') return pageKomm();
  if(name==='Adresse & Finanzamt') return pageAddr();
  if(name==='Bankverbindung') return pageBank();
  if(name==='Leistungen') return pageLeistungen();
  if(name==='Intern') return pageIntern();
  if(name==='Zusammenfassung') return pageSummary();
  return '';
}

function renderAll(){
  var s = steps();
  var total = s.length;

  var nav = document.getElementById('stepsNav');
  var navHtml = '';
  for(var i=0; i<s.length; i++){
    var cls = 'step-btn';
    if(i===currentStep) cls += ' active';
    if(i<currentStep) cls += ' done';
    navHtml += '<button class="' + cls + '" onclick="currentStep=' + i + ';renderAll()">' +
    '<span class="step-num">' + (i+1) + '</span>' + s[i] + '</button>';
  }
  nav.innerHTML = navHtml;

  var pct = currentStep===0 ? 0 : Math.round(currentStep/(total-1)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('stepPct').textContent = pct+'%';
  document.getElementById('stepLabel').textContent = 'Schritt ' + (currentStep+1) + ' von ' + total;

  var pages = document.getElementById('pages');
  var html = '<div>' + getPageContent(currentStep);

  if(currentStep===0 && !D.mtype){
    html += '';
  } else if(currentStep < total-1){
    html += '<div class="nav-bar">';
    if(currentStep>0) html += '<button class="btn-secondary" onclick="currentStep--;renderAll()">&#8592; Zurueck</button>';
    html += '<button class="btn-primary" onclick="currentStep++;renderAll()">Weiter &#8594;</button>';
    html += '</div>';
  } else {
    html += '<div class="nav-bar">';
    html += '<button class="btn-secondary" onclick="currentStep--;renderAll()">&#8592; Zurueck</button>';
    html += '<button class="btn-print" onclick="window.print()">&#128424; Als PDF speichern</button>';
    html += '<button class="btn-export" onclick="exportJSON()">&#128229; JSON Export</button>';
    html += '</div>';
  }
  html += '</div>';
  pages.innerHTML = html;
}

function toggleArr(key, val){
  if(!D[key]) D[key]=[];
  var i=D[key].indexOf(val);
  if(i>-1) D[key].splice(i,1); else D[key].push(val);
  renderAll();
}

function toggleKind(idx, val){
  if(!D.kinder[idx].positionen) D.kinder[idx].positionen=[];
  var i=D.kinder[idx].positionen.indexOf(val);
  if(i>-1) D.kinder[idx].positionen.splice(i,1); else D.kinder[idx].positionen.push(val);
  renderAll();
}

function exportJSON(){
  var dataStr = JSON.stringify(D, null, 2);
  var blob = new Blob([dataStr], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'mandant_' + (D.intmandnr||'export') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  if(e.ctrlKey && e.key==='y'){ e.preventDefault(); redo(); }
});

// Initialize
loadFromStorage();
